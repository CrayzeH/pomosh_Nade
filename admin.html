<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Созвездие</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a2e;
            color: #eee;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .login-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .login-card h1 {
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .login-card input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 1rem;
        }

        .login-card input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #e94560;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-card button:hover {
            background: #ff6b6b;
        }

        .error-msg {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        /* Админ панель */
        .admin-container {
            display: none;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #16213e;
            position: fixed;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
            font-size: 1.3rem;
            color: #e94560;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: #aaa;
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .sidebar nav a:hover, .sidebar nav a.active {
            background: #e94560;
            color: white;
        }

        .main-content {
            margin-left: 260px;
            padding: 20px;
            width: calc(100% - 260px);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .logout-btn {
            background: #e94560;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2rem;
            color: #e94560;
        }

        .table-container {
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            color: #e94560;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .status-pending { background: #f39c12; color: #333; }
        .status-approved { background: #2ecc71; color: #333; }
        .status-rejected { background: #e74c3c; color: white; }

        .btn-edit, .btn-delete, .btn-answer {
            background: none;
            border: none;
            cursor: pointer;
            margin: 0 5px;
            font-size: 1.1rem;
        }
        .btn-edit { color: #3498db; }
        .btn-delete { color: #e74c3c; }
        .btn-answer { color: #2ecc71; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #16213e;
            border-radius: 15px;
            padding: 30px;
            width: 400px;
            max-width: 90%;
        }
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #0f3460;
            color: white;
        }
        .modal-content button {
            background: #e94560;
            border: none;
            padding: 10px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 10px;
            }
            .sidebar h2, .sidebar nav a span {
                display: none;
            }
            .main-content {
                margin-left: 70px;
                width: calc(100% - 70px);
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Форма входа -->
    <div id="loginContainer" class="login-container">
        <div class="login-card">
            <h1>🔐 Вход в админ-панель</h1>
            <input type="password" id="adminPassword" placeholder="Введите пароль">
            <button id="loginAdminBtn">Войти</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <!-- Админ панель -->
    <div id="adminContainer" class="admin-container">
        <div class="sidebar">
            <h2>⭐ Созвездие</h2>
            <nav>
                <a href="#" data-page="dashboard" class="active">
                    <i class="fas fa-tachometer-alt"></i> <span>Дашборд</span>
                </a>
                <a href="#" data-page="users">
                    <i class="fas fa-users"></i> <span>Пользователи</span>
                </a>
                <a href="#" data-page="applications">
                    <i class="fas fa-file-alt"></i> <span>Заявки</span>
                </a>
                <a href="#" data-page="questions">
                    <i class="fas fa-question-circle"></i> <span>Вопросы</span>
                </a>
                <a href="#" data-page="squads">
                    <i class="fas fa-campground"></i> <span>Отряды</span>
                </a>
            </nav>
        </div>
        <div class="main-content">
            <div class="top-bar">
                <h1 id="pageTitle">Дашборд</h1>
                <button class="logout-btn" id="adminLogoutBtn">Выйти</button>
            </div>
            <div id="pageContent"></div>
        </div>
    </div>

    <!-- Модальное окно для ответа на вопрос -->
    <div id="answerModal" class="modal">
        <div class="modal-content">
            <h3>Ответ на вопрос</h3>
            <textarea id="answerText" rows="4" placeholder="Введите ответ..."></textarea>
            <button id="submitAnswerBtn">Отправить ответ</button>
        </div>
    </div>

    <script>
        let currentQuestionId = null;

        // Проверка статуса админа
        async function checkAdminStatus() {
            try {
                const response = await fetch('/api/admin/check');
                const data = await response.json();
                if (data.isAdmin) {
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('adminContainer').style.display = 'block';
                    loadDashboard();
                }
            } catch (error) {
                console.error('Ошибка проверки статуса:', error);
            }
        }

        // Вход в админку
        document.getElementById('loginAdminBtn')?.addEventListener('click', async () => {
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('adminContainer').style.display = 'block';
                    loadDashboard();
                } else {
                    errorDiv.textContent = 'Неверный пароль';
                }
            } catch (error) {
                errorDiv.textContent = 'Ошибка соединения';
            }
        });

        // Выход
        document.getElementById('adminLogoutBtn')?.addEventListener('click', async () => {
            await fetch('/api/admin/logout', { method: 'POST' });
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminContainer').style.display = 'none';
        });

        // Навигация
        document.querySelectorAll('.sidebar nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.sidebar nav a').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                const page = link.getAttribute('data-page');
                document.getElementById('pageTitle').textContent = link.querySelector('span').textContent;
                loadPage(page);
            });
        });

        async function loadPage(page) {
            const content = document.getElementById('pageContent');
            switch(page) {
                case 'dashboard':
                    await loadDashboard();
                    break;
                case 'users':
                    await loadUsers();
                    break;
                case 'applications':
                    await loadApplications();
                    break;
                case 'questions':
                    await loadQuestions();
                    break;
                case 'squads':
                    await loadSquads();
                    break;
            }
        }

        async function loadDashboard() {
            try {
                const response = await fetch('/api/admin/stats');
                const data = await response.json();
                document.getElementById('pageContent').innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <i class="fas fa-users fa-2x"></i>
                            <h3>${data.users || 0}</h3>
                            <p>Пользователей</p>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-file-alt fa-2x"></i>
                            <h3>${data.applications || 0}</h3>
                            <p>Заявок</p>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-question-circle fa-2x"></i>
                            <h3>${data.pendingQuestions || 0}</h3>
                            <p>Новых вопросов</p>
                        </div>
                    </div>
                    <div class="table-container">
                        <h3>Последние действия</h3>
                        <p style="color: #aaa; padding: 20px;">Админ-панель готова к работе</p>
                    </div>
                `;
            } catch (error) {
                console.error('Ошибка загрузки дашборда:', error);
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch('/api/admin/users');
                const data = await response.json();
                if (data.users && data.users.length > 0) {
                    document.getElementById('pageContent').innerHTML = `
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr><th>ID</th><th>ФИО</th><th>Email</th><th>Телефон</th><th>Роль</th><th>Действия</th></tr>
                                </thead>
                                <tbody>
                                    ${data.users.map(user => `
                                        <tr>
                                            <td>${user.id}</td>
                                            <td>${user.full_name}</td>
                                            <td>${user.email}</td>
                                            <td>${user.phone}</td>
                                            <td>
                                                <select onchange="updateUserRole(${user.id}, this.value)">
                                                    <option value="user" ${user.role === 'user' ? 'selected' : ''}>Пользователь</option>
                                                    <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Админ</option>
                                                </select>
                                            </td>
                                            <td>
                                                <button class="btn-delete" onclick="deleteUser(${user.id})"><i class="fas fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                } else {
                    document.getElementById('pageContent').innerHTML = '<div class="table-container"><p>Нет пользователей</p></div>';
                }
            } catch (error) {
                console.error('Ошибка загрузки пользователей:', error);
            }
        }

        async function loadApplications() {
            try {
                const response = await fetch('/api/admin/applications');
                const data = await response.json();
                if (data.applications && data.applications.length > 0) {
                    document.getElementById('pageContent').innerHTML = `
                        <div class="table-container">
                            <table>
                                <thead><tr><th>ID</th><th>Отряд</th><th>ФИО</th><th>Телефон</th><th>Статус</th><th>Действия</th></tr></thead>
                                <tbody>
                                    ${data.applications.map(app => `
                                        <tr>
                                            <td>${app.id}</td>
                                            <td>${app.squad_name}</td>
                                            <td>${app.full_name}</td>
                                            <td>${app.phone}</td>
                                            <td>
                                                <select onchange="updateApplicationStatus(${app.id}, this.value)">
                                                    <option value="pending" ${app.status === 'pending' ? 'selected' : ''}>На рассмотрении</option>
                                                    <option value="approved" ${app.status === 'approved' ? 'selected' : ''}>Одобрено</option>
                                                    <option value="rejected" ${app.status === 'rejected' ? 'selected' : ''}>Отклонено</option>
                                                </select>
                                            </td>
                                            <td>
                                                <button class="btn-edit" onclick="editApplication(${app.id})"><i class="fas fa-comment"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                } else {
                    document.getElementById('pageContent').innerHTML = '<div class="table-container"><p>Нет заявок</p></div>';
                }
            } catch (error) {
                console.error('Ошибка загрузки заявок:', error);
            }
        }

        async function loadQuestions() {
            try {
                const response = await fetch('/api/admin/questions');
                const data = await response.json();
                if (data.questions && data.questions.length > 0) {
                    document.getElementById('pageContent').innerHTML = `
                        <div class="table-container">
                            <table>
                                <thead><tr><th>ID</th><th>Имя</th><th>Телефон</th><th>Вопрос</th><th>Статус</th><th>Действия</th></tr></thead>
                                <tbody>
                                    ${data.questions.map(q => `
                                        <tr>
                                            <td>${q.id}</td>
                                            <td>${q.name}</td>
                                            <td>${q.phone}</td>
                                            <td style="max-width: 300px; word-break: break-word;">${q.question}</td>
                                            <td>${q.is_answered ? '✅ Отвечен' : '⏳ Ожидает'}</td>
                                            <td>
                                                ${!q.is_answered ? `<button class="btn-answer" onclick="openAnswerModal(${q.id})"><i class="fas fa-reply"></i></button>` : ''}
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                } else {
                    document.getElementById('pageContent').innerHTML = '<div class="table-container"><p>Нет вопросов</p></div>';
                }
            } catch (error) {
                console.error('Ошибка загрузки вопросов:', error);
            }
        }

        async function loadSquads() {
            try {
                const response = await fetch('/api/admin/squads');
                const data = await response.json();
                if (data.squads && data.squads.length > 0) {
                    document.getElementById('pageContent').innerHTML = `
                        <div class="table-container">
                            <table>
                                <thead><tr><th>ID</th><th>Название</th><th>Описание</th><th>Активен</th><th>Действия</th></tr></thead>
                                <tbody>
                                    ${data.squads.map(squad => `
                                        <tr>
                                            <td>${squad.id}</td>
                                            <td>${squad.name}</td>
                                            <td style="max-width: 300px;">${squad.description}</td>
                                            <td>
                                                <select onchange="updateSquadStatus(${squad.id}, this.value)">
                                                    <option value="1" ${squad.is_active === 1 ? 'selected' : ''}>Активен</option>
                                                    <option value="0" ${squad.is_active === 0 ? 'selected' : ''}>Скрыт</option>
                                                </select>
                                            </td>
                                            <td>
                                                <button class="btn-edit" onclick="editSquad(${squad.id})"><i class="fas fa-edit"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Ошибка загрузки отрядов:', error);
            }
        }

        // Глобальные функции для кнопок
        window.updateUserRole = async (userId, role) => {
            await fetch(`/api/admin/users/${userId}/role`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role })
            });
            alert('Роль обновлена');
        };

        window.deleteUser = async (userId) => {
            if (confirm('Удалить пользователя?')) {
                await fetch(`/api/admin/users/${userId}`, { method: 'DELETE' });
                loadUsers();
            }
        };

        window.updateApplicationStatus = async (appId, status) => {
            await fetch(`/api/admin/applications/${appId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            alert('Статус обновлен');
        };

        window.openAnswerModal = (questionId) => {
            currentQuestionId = questionId;
            document.getElementById('answerModal').classList.add('active');
        };

        document.getElementById('submitAnswerBtn')?.addEventListener('click', async () => {
            const answer = document.getElementById('answerText').value;
            if (!answer) {
                alert('Введите ответ');
                return;
            }
            await fetch(`/api/admin/questions/${currentQuestionId}/answer`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ answer })
            });
            document.getElementById('answerModal').classList.remove('active');
            document.getElementById('answerText').value = '';
            loadQuestions();
            alert('Ответ отправлен');
        });

        document.querySelector('.modal')?.addEventListener('click', (e) => {
            if (e.target === document.querySelector('.modal')) {
                document.querySelector('.modal').classList.remove('active');
            }
        });

        window.updateSquadStatus = async (squadId, isActive) => {
            await fetch(`/api/admin/squads/${squadId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_active: parseInt(isActive) })
            });
            alert('Статус отряда обновлен');
        };

        window.editSquad = (squadId) => {
            alert('Редактирование отряда в разработке');
        };

        checkAdminStatus();
    </script>
</body>
</html>
