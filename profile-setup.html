<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Созвездие — Настройка профиля</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="profile-card" aria-labelledby="profile-title">
      <h1 class="profile-title" id="profile-title">Настройка профиля</h1>
      <p class="profile-subtitle">Пожалуйста, укажите данные профиля</p>

      <div class="profile-stepper" aria-label="Шаг 1 из 2">
        <span class="step-dot step-dot--active">1</span>
        <span class="step-line"></span>
        <span class="step-dot step-dot--muted">2</span>
      </div>

      <form class="profile-form" id="profile-setup-form" action="profile-setup-step2.html" method="get" novalidate>
        <div class="profile-group">
          <p class="profile-label">Имя</p>
          <p class="profile-help">Как тебя будут видеть другие пользователи</p>
          <input class="profile-input" id="setup-name" type="text" placeholder="Иван Иванов" autocomplete="name" />
        </div>

        <div class="profile-group">
          <p class="profile-label">Никнейм</p>
          <p class="profile-help">Уникальный никнейм для твоего профиля<br>( латиница, цифры, и “_” )</p>
          <input class="profile-input" id="setup-handle" type="text" placeholder="ivanov1998" autocomplete="username" />
        </div>

        <button class="profile-submit" type="submit">Продолжить</button>
      </form>
    </section>
  </main>

  <script src="/js/social-app.js"></script>
</body>
</html>
