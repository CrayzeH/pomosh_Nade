<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Созвездие — Настройка профиля</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="profile-card" aria-labelledby="profile-title">
      <h1 class="profile-title" id="profile-title">Настройка профиля</h1>
      <p class="profile-subtitle">Пожалуйста, укажите данные профиля</p>

      <div class="profile-stepper" aria-label="Шаг 1 из 2">
        <span class="step-dot step-dot--active">1</span>
        <span class="step-line"></span>
        <span class="step-dot step-dot--muted">2</span>
      </div>

      <form class="profile-form" id="profile-setup-form" action="profile-setup-step2.html" method="get" novalidate>
        <div class="profile-group">
          <p class="profile-label">Имя</p>
          <p class="profile-help">Как тебя будут видеть другие пользователи</p>
          <input class="profile-input" id="setup-name" type="text" placeholder="Иван Иванов" autocomplete="name" />
        </div>

        <div class="profile-group">
          <p class="profile-label">Никнейм</p>
          <p class="profile-help">Уникальный никнейм для твоего профиля<br>( латиница, цифры, и “_” )</p>
          <input class="profile-input" id="setup-handle" type="text" placeholder="ivanov1998" autocomplete="username" />
        </div>

        <button class="profile-submit" type="submit">Продолжить</button>
      </form>
    </section>
  </main>

  <script>
    const USER_PROFILE_STORAGE_KEY = 'sozvezdie_user_profile_v1';
    const AUTH_SESSION_STORAGE_KEY = 'sozvezdie_auth_session_v1';
    const requireAuth = () => {
      try {
        if (localStorage.getItem(AUTH_SESSION_STORAGE_KEY)) return;
      } catch {}
      window.location.replace('login.html');
    };
    requireAuth();
    const setupForm = document.querySelector('#profile-setup-form');
    const nameInput = document.querySelector('#setup-name');
    const handleInput = document.querySelector('#setup-handle');

    const readCurrentUser = () => {
      try {
        const raw = localStorage.getItem(USER_PROFILE_STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return null;
        return parsed;
      } catch {
        return null;
      }
    };

    const saveCurrentUser = (nextUser) => {
      try {
        localStorage.setItem(USER_PROFILE_STORAGE_KEY, JSON.stringify(nextUser));
      } catch {}
    };

    const existingUser = readCurrentUser();
    if (existingUser?.name && nameInput) nameInput.value = existingUser.name;
    if (existingUser?.handle && handleInput) handleInput.value = existingUser.handle;

    setupForm?.addEventListener('submit', () => {
      const name = nameInput?.value.trim() || 'Persona';
      const handle = (handleInput?.value.trim().replace(/^@+/, '') || 'persona');
      saveCurrentUser({
        ...(existingUser || {}),
        name,
        handle,
        avatar: existingUser?.avatar || ''
      });
    });
  </script>
</body>
</html>
